services:
  - type: worker
    name: spotify-music-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: spoti_music_bot
      - key: LOG_CHANNEL
        value: "0"
      - key: DEV_URL
        sync: false
